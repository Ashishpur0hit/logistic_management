spring.application.name=shipment-service
server.port=8082
spring.datasource.url=jdbc:postgresql://postgres:5432/logistics_shipment
spring.datasource.username=postgres
spring.datasource.password=263160

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=shipment-group

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.value.default.type=com.logistics.shipment_service.event.PaymentEvent

spring.data.redis.host=redis
spring.data.redis.port=6379


eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone = http://service-registry:8761/eureka

